industry: construction
rules:
  - rule_id: construction.cost_escalation_risk
    name: 变相增项 / 费用另计风险
    category: cost
    severity: high
    type: keyword
    trigger:
      any:
        - "额外增加项目"
        - "费用另计"
        - "费用另算"
        - "按公司ERP定额另计"
        - "另行收费"
    description: "合同中存在大量费用另计或额外增加表述，可能导致最终结算价远超预算。"
    why_it_matters: "装修和工程合同常通过模糊增项条款让甲方在履行过程中不断追加费用。"
    recommendation: "要求提供闭口合同，明确增项比例上限，并要求所有增项必须经我方书面确认。"
    risk_type: cost_escalation
    confidence_base: 0.9
    requires_llm: false
    escalation: true

  - rule_id: construction.brand_spec_vagueness
    name: 品牌 / 规格模糊风险
    category: quality
    severity: high
    type: semantic
    trigger:
      any:
        - "同等档次品牌"
        - "指定品牌"
        - "芯安等"
        - "圣象/八方地板/卢森地板"
    description: "材料品牌表述为同等档次或多个跨度较大的品牌，可能留下高价低配空间。"
    why_it_matters: "品牌和规格不明确时，施工方可能使用低端系列或不知名替代品。"
    recommendation: "要求明确单一品牌、具体系列型号，并在附件中封样。"
    risk_type: quality_vagueness
    confidence_base: 0.5
    requires_llm: true
    escalation: true

  - rule_id: construction.unlimited_item_trap
    name: 不限量项目陷阱
    category: cost
    severity: medium
    type: keyword
    trigger:
      any:
        - "不限量"
        - "不限厚度"
        - "不限数量"
    description: "虽然表述为不限量，但往往伴随苛刻适用条件或后续收费空间。"
    why_it_matters: "不限量通常是营销表述，实际施工时可能因超出标配或特殊工艺被额外收费。"
    recommendation: "核实不限量覆盖范围，特别是找平、腻子、拆改等基础工程的厚度和工艺要求。"
    risk_type: cost_scope_trap
    confidence_base: 0.9
    requires_llm: false
    escalation: false
