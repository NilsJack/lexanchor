industry: construction
rules:
  # ==========================================
  # 建筑/装修 行业特定风险
  # ==========================================

  - rule_id: construction.cost_escalation_risk
    name: 变相增项/费用另计风险
    category: cost
    severity: high
    type: keyword
    trigger:
      any:
        - "额外增加项目"
        - "费用另计"
        - "费用另算"
        - "按公司ERP定额另计"
        - "另行收费"
    description: >
      合同中存在大量“费用另计”或“额外增加”表述，可能导致最终结算价远超预算。
    why_it_matters: >
      装修行业常见的“低开高走”套路，通过模糊的增项条款让消费者在施工过程中不断追加费用。
    recommendation: >
      要求装修公司提供闭口合同，或明确增项比例上限（如不超过合同总额的5%），并要求所有增项必须经我方书面确认。
    requires_llm: false
    escalation: true

  - rule_id: construction.brand_spec_vagueness
    name: 品牌/规格模糊风险
    category: quality
    severity: high
    type: semantic
    trigger:
      any:
        - "圣象/八方地板/卢森地板" # 这种多选一且品质可能有差的写法
        - "芯安等"
        - "同等档次品牌"
        - "指定品牌"
    description: >
      材料品牌表述为“某某或同等档次”，或列出多个跨度较大的品牌，给装修公司留下了“高价低配”的空间。
    why_it_matters: >
      品牌和规格不明确，施工方可能使用该品牌下的低端系列或不知名替代品，影响装修质量。
    recommendation: >
      要求明确单一品牌及具体系列型号，并在附件中附上样板图片或封样。
    requires_llm: true
    escalation: true

  - rule_id: construction.unlimited_item_trap
    name: “不限量”项目陷阱
    category: cost
    severity: medium
    type: keyword
    trigger:
      any:
        - "不限量"
        - "不限厚度"
        - "不限数量"
    description: >
      虽然表述为“不限量”，但往往伴随苛刻的适用条件（如：仅限某区域、不含某工艺）。
    why_it_matters: >
      “不限量”通常是营销手段，实际施工时可能因“超出标配”或“特殊工艺”被收取额外费用。
    recommendation: >
      核实“不限量”的真实覆盖范围，特别是地面找平、墙面腻子等基础工程的厚度和工艺要求。
    requires_llm: false
    escalation: false
