id: lex_anchor_tool
name: LexAnchor 合同风险锚点审查
description: "专业的法律合规审查工具。支持提取PDF合同内容，利用规则引擎和LLM双重研判风险锚点（如解除条款、争议解决、增项风险等），并生成带高亮标注的PDF报告。特别擅长装修、工程类合同。"
kind: python
entrypoint: main_lex_anchor.py
parameters:
  file_path:
    type: string
    description: "需要审查的PDF合同文件路径（绝对路径或相对于项目根目录的路径）"
    required: false
  industry_id:
    type: string
    description: "行业类型，如 'construction'（装修工程，默认值）, 'it_service' 等"
    required: false
  action:
    type: string
    description: "执行动作：run（默认审查合同）或 list（列出已装配行业规则库）。"
    required: false
usage: "阿郎，帮我审一下这个装修合同: [file_path]"
examples:
  - "审查合同: workspace/downloads/2.pdf"
  - "分析这个装修合同的风险，行业设为 construction: samples/contract.pdf"
  - "列出当前可用行业规则库"
runtime:
  execution_mode: background
  renderer: lex_anchor_tool
  auto_deliver_outputs: true
