version: "0.3"
extends: rules_v0.2
domain: contract
contract_scope: saas_vendor
rules:
  - rule_id: obligation.payment_timing
    name: 付款期限义务
    category: payment
    severity: medium
    type: obligation
    trigger:
      any:
        - "shall pay"
        - "must pay"
        - "应支付"
        - "应当支付"
        - "付款期限"
        - "payment due"
    description: "识别付款期限、付款动作或付款触发条件相关义务。"
    why_it_matters: "付款义务决定现金流、逾期责任和履约节点，是合同执行管理的核心义务。"
    recommendation: "确认付款主体、金额、发票条件、付款期限、争议金额处理和逾期后果。"
    risk_type: payment_obligation
    confidence_base: 0.75
    escalation: false

  - rule_id: obligation.notice_period
    name: 通知期限义务
    category: notice
    severity: medium
    type: obligation
    trigger:
      any:
        - "提前通知"
        - "书面通知"
        - "prior written notice"
        - "written notice"
        - "days notice"
        - "notice period"
    description: "识别提前通知、书面通知或通知期限相关义务。"
    why_it_matters: "通知义务影响终止、续约、变更、索赔和违约救济能否有效行使。"
    recommendation: "确认通知方式、送达地址、提前期限、送达生效时间和未通知后果。"
    risk_type: notice_obligation
    confidence_base: 0.75
    escalation: false

  - rule_id: obligation.data_return_deletion
    name: 数据返还 / 删除义务
    category: data_governance
    severity: high
    type: obligation
    trigger:
      any:
        - "返还数据"
        - "删除数据"
        - "销毁数据"
        - "return data"
        - "delete data"
        - "destroy data"
    description: "识别合同终止或到期后的数据返还、删除或销毁义务。"
    why_it_matters: "数据处理结束后的返还/删除义务直接影响商业秘密、个人信息和客户资料安全。"
    recommendation: "明确处理期限、证明义务、备份数据处理、法定留存例外和分包商同步删除。"
    risk_type: data_exit_obligation
    confidence_base: 0.8
    escalation: true

  - rule_id: obligation.security_incident_notice
    name: 安全事件通知义务
    category: security
    severity: high
    type: obligation
    trigger:
      any:
        - "安全事件"
        - "数据泄露"
        - "security incident"
        - "data breach"
        - "notify customer"
        - "通知客户"
    description: "识别安全事件、数据泄露或事件通知相关义务。"
    why_it_matters: "安全事件通知义务影响监管报告、客户告知、证据保全和损失控制。"
    recommendation: "明确通知时限、通知内容、协助义务、根因分析、补救措施和费用承担。"
    risk_type: security_notification_obligation
    confidence_base: 0.8
    escalation: true

  - rule_id: obligation.delivery_acceptance
    name: 交付与验收义务
    category: delivery
    severity: medium
    type: obligation
    trigger:
      any:
        - "交付物"
        - "验收标准"
        - "验收测试"
        - "deliverables"
        - "acceptance criteria"
        - "acceptance testing"
        - "deemed accepted"
    description: "识别交付物、验收标准、验收测试或视为验收相关义务。"
    why_it_matters: "交付和验收决定付款、缺陷修复、上线时间和项目风险转移。"
    recommendation: "明确交付清单、验收标准、测试周期、缺陷分级、拒收机制和视为验收条件。"
    risk_type: delivery_acceptance_obligation
    confidence_base: 0.75
    escalation: false

  - rule_id: obligation.audit_cooperation
    name: 审计配合义务
    category: audit
    severity: medium
    type: obligation
    trigger:
      any:
        - "协助审计"
        - "提供记录"
        - "audit assistance"
        - "cooperate with audit"
        - "provide records"
        - "audit records"
    description: "识别审计配合、记录提供或合规检查支持义务。"
    why_it_matters: "审计配合义务影响监管、客户审计、证据保全和供应商合规验证。"
    recommendation: "明确审计范围、频次、通知期限、费用承担、保密措施和第三方审计限制。"
    risk_type: audit_cooperation_obligation
    confidence_base: 0.75
    escalation: false

  - rule_id: obligation.confidentiality_survival
    name: 保密义务存续
    category: confidentiality
    severity: high
    type: obligation
    trigger:
      any:
        - "保密义务继续有效"
        - "保密义务存续"
        - "confidentiality obligations survive"
        - "survive termination"
        - "survival of confidentiality"
    description: "识别合同终止后保密义务继续有效的条款。"
    why_it_matters: "保密义务是否存续直接影响合同结束后的商业秘密和敏感信息保护。"
    recommendation: "区分一般保密期限和商业秘密永久保护，并覆盖关联方、员工和分包商。"
    risk_type: confidentiality_survival_obligation
    confidence_base: 0.8
    escalation: true

  - rule_id: obligation.insurance_coverage
    name: 保险维持义务
    category: insurance
    severity: medium
    type: obligation
    trigger:
      any:
        - "维持保险"
        - "保险凭证"
        - "maintain insurance"
        - "certificate of insurance"
        - "insurance coverage"
        - "cyber insurance"
    description: "识别责任险、网络安全险或保险凭证维持义务。"
    why_it_matters: "保险义务影响风险转移能力，尤其在数据安全、专业服务和重大赔偿场景下。"
    recommendation: "确认险种、保额、免赔额、被保险人范围、取消通知和保险凭证交付。"
    risk_type: insurance_obligation
    confidence_base: 0.75
    escalation: false

  - rule_id: obligation.compliance_with_laws
    name: 遵守适用法律义务
    category: compliance
    severity: medium
    type: obligation
    trigger:
      any:
        - "遵守适用法律"
        - "依法合规"
        - "comply with applicable laws"
        - "compliance with laws"
        - "all applicable laws"
    description: "识别遵守适用法律、监管要求或合规标准的义务。"
    why_it_matters: "合规义务需要分配到各自控制范围，过宽或缺失都会造成履约和监管风险。"
    recommendation: "明确双方分别对自身行为、系统、数据处理和服务交付承担合规义务。"
    risk_type: legal_compliance_obligation
    confidence_base: 0.75
    escalation: false

  - rule_id: obligation.subcontractor_flowdown
    name: 分包商义务传导
    category: subcontracting
    severity: high
    type: obligation
    trigger:
      any:
        - "分包商承担同等义务"
        - "传导义务"
        - "flow down obligations"
        - "ensure subcontractors"
        - "subcontractors comply"
        - "subcontractor obligations"
    description: "识别供应商需要向分包商或子处理者传导合同义务的条款。"
    why_it_matters: "没有义务传导，分包商可能成为数据、安全、保密和服务承诺的薄弱环节。"
    recommendation: "要求供应商确保分包商承担不低于主合同的保密、安全、数据处理和审计义务，并对其行为负责。"
    risk_type: subcontractor_flowdown_obligation
    confidence_base: 0.8
    escalation: true

  - rule_id: relation.termination_data_return_dependency
    name: 终止与数据返还删除依赖
    category: data_governance
    severity: high
    type: relation
    trigger:
      requires_all:
        - "termination"
        - "return data"
    relation:
      type: dependency
      source: "termination"
      target: "return data"
      direction: source_to_target
    description: "识别终止条款与数据返还/删除义务之间的依赖关系。"
    why_it_matters: "终止后数据处理依赖关系不清会造成数据滞留、取证困难和合规责任不明。"
    recommendation: "确保终止条款明确触发数据返还/删除/销毁证明，并覆盖备份和分包商。"
    risk_type: clause_dependency_gap
    confidence_base: 0.7
    escalation: true

  - rule_id: relation.sla_service_credit_dependency
    name: SLA与服务信用依赖
    category: service_level
    severity: medium
    type: relation
    trigger:
      requires_all:
        - "service level"
        - "service credit"
    relation:
      type: remedy_dependency
      source: "service level"
      target: "service credit"
      direction: source_to_target
    description: "识别服务等级承诺与服务信用/补偿机制之间的依赖关系。"
    why_it_matters: "只有 SLA 而没有可执行补偿机制，服务质量承诺可能难以落地。"
    recommendation: "核对可用性指标、排除项、计算方式、服务信用上限和重复故障终止权。"
    risk_type: sla_remedy_dependency
    confidence_base: 0.7
    escalation: false

  - rule_id: relation.payment_suspension_dependency
    name: 付款逾期与暂停服务依赖
    category: payment
    severity: high
    type: relation
    trigger:
      requires_all:
        - "payment due"
        - "suspend services"
    relation:
      type: enforcement_dependency
      source: "payment due"
      target: "suspend services"
      direction: source_to_target
    description: "识别付款到期或逾期与供应商暂停服务权之间的依赖关系。"
    why_it_matters: "暂停服务应与未付款、争议金额、通知和补救期绑定，否则可能造成业务中断。"
    recommendation: "要求暂停前通知、合理补救期、争议金额排除、关键服务例外和数据导出权。"
    risk_type: payment_service_dependency
    confidence_base: 0.7
    escalation: true

  - rule_id: relation.confidentiality_residual_exception
    name: 保密义务与残留知识例外关系
    category: confidentiality
    severity: high
    type: relation
    trigger:
      requires_all:
        - "confidentiality"
        - "residual knowledge"
    relation:
      type: exception_conflict
      source: "confidentiality"
      target: "residual knowledge"
      direction: exception_limits_source
    description: "识别保密义务与残留知识例外之间的限制或冲突关系。"
    why_it_matters: "残留知识例外可能削弱保密义务，尤其会影响商业秘密和敏感技术信息保护。"
    recommendation: "删除残留知识例外，或至少排除商业秘密、个人信息、源代码、价格和客户资料。"
    risk_type: confidentiality_exception_dependency
    confidence_base: 0.7
    escalation: true

  - rule_id: relation.security_incident_remediation_dependency
    name: 安全事件与补救义务依赖
    category: security
    severity: high
    type: relation
    trigger:
      requires_all:
        - "security incident"
        - "remediate"
    relation:
      type: response_dependency
      source: "security incident"
      target: "remediate"
      direction: source_to_target
    description: "识别安全事件触发通知、调查、补救或恢复义务的依赖关系。"
    why_it_matters: "只有事件通知而没有补救和协助义务，会削弱实际风险控制能力。"
    recommendation: "补充事件调查、补救、恢复、证据保全、监管协助和费用承担。"
    risk_type: security_response_dependency
    confidence_base: 0.75
    escalation: true

  - rule_id: relation.subprocessor_data_processing_dependency
    name: 子处理者与客户数据处理依赖
    category: data_governance
    severity: high
    type: relation
    trigger:
      requires_all:
        - "subprocessor"
        - "customer data"
    relation:
      type: processing_dependency
      source: "subprocessor"
      target: "customer data"
      direction: source_to_target
    description: "识别子处理者使用与客户数据处理之间的依赖关系。"
    why_it_matters: "子处理者会改变数据处理链路，需要通知、审批、等同义务和责任承接。"
    recommendation: "要求披露子处理者、提前通知、反对权、数据处理协议传导和供应商连带责任。"
    risk_type: subprocessor_data_dependency
    confidence_base: 0.75
    escalation: true

  - rule_id: relation.acceptance_payment_dependency
    name: 验收与付款依赖
    category: delivery
    severity: medium
    type: relation
    trigger:
      requires_all:
        - "acceptance"
        - "payment due"
    relation:
      type: commercial_dependency
      source: "acceptance"
      target: "payment due"
      direction: source_to_target
    description: "识别验收结果与付款到期之间的依赖关系。"
    why_it_matters: "付款与验收是否绑定会影响缺陷交付、争议金额和项目现金流控制。"
    recommendation: "明确付款是否以验收通过为条件，以及争议金额、部分验收和视为验收规则。"
    risk_type: acceptance_payment_dependency
    confidence_base: 0.7
    escalation: false

  - rule_id: relation.audit_records_dependency
    name: 审计权与记录保存依赖
    category: audit
    severity: medium
    type: relation
    trigger:
      requires_all:
        - "audit"
        - "records"
    relation:
      type: evidence_dependency
      source: "audit"
      target: "records"
      direction: source_to_target
    description: "识别审计权与记录保存、记录提供之间的依赖关系。"
    why_it_matters: "没有记录保存和提供义务，审计权难以执行；过宽记录义务也可能造成商业秘密泄露。"
    recommendation: "明确记录类型、保存期限、访问方式、审计范围、保密措施和费用承担。"
    risk_type: audit_records_dependency
    confidence_base: 0.7
    escalation: false
