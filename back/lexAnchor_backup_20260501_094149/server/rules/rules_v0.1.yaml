version: "0.1"
domain: contract
contract_scope: saas_vendor
rules:
  - rule_id: contract.unlimited_liability
    name: 无限责任条款检测
    category: liability
    severity: critical
    type: keyword
    trigger:
      any:
        - "无限责任"
        - "不设任何赔偿上限"
        - "without limitation of liability"
        - "unlimited liability"
        - "承担全部损失"
        - "承担全部赔偿责任"
    description: "条款中未设置责任上限，可能导致责任暴露不可控。"
    why_it_matters: "无限责任可能导致企业承担不可预估的商业及财务损失风险。"
    recommendation: "建议增加责任上限，例如合同金额的12个月费用，并明确排除间接损失。"
    risk_type: financial_exposure
    confidence_base: 0.9
    requires_llm: false
    escalation: true

  - rule_id: contract.indemnity_imbalance
    name: 单方免责 / 单方赔偿不对等
    category: liability
    severity: critical
    type: semantic
    trigger:
      any:
        - "免责"
        - "免除"
        - "不承担任何责任"
        - "indemnify and hold harmless"
        - "solely responsible"
    description: "检测到免责或赔偿条款，需要判定是否构成单方免责或赔偿义务严重不对等。"
    why_it_matters: "单方免责会使一方完全逃避责任，将风险全部转嫁给另一方。"
    recommendation: "建议修改为双向对等赔偿，或删除对方的单方免责声明。"
    risk_type: liability_shift
    confidence_base: 0.5
    requires_llm: true
    escalation: true

  - rule_id: contract.unilateral_change
    name: 单方修改权检测
    category: governance
    severity: high
    type: keyword
    trigger:
      any:
        - "有权随时修改"
        - "无需通知即可变更"
        - "可单方调整"
        - "reserve the right to modify at any time"
        - "有权单方面变更"
    description: "条款允许一方在未经对方同意或充分通知的情况下修改合同内容。"
    why_it_matters: "该条款可能导致合同义务和商业条件不稳定，使另一方处于被动接受的劣势。"
    recommendation: "建议增加通知期限、变更生效条件，并赋予对方无责任终止权。"
    risk_type: governance_instability
    confidence_base: 0.9
    requires_llm: false
    escalation: true

  - rule_id: contract.auto_renewal
    name: 自动续约检测
    category: term
    severity: high
    type: keyword
    trigger:
      any:
        - "自动续约"
        - "自动展期"
        - "自动延长"
        - "automatically renew"
        - "auto-renew"
    description: "合同包含自动续订条款，可能在不知情的情况下产生额外订阅费用。"
    why_it_matters: "如果缺乏退出机制跟踪，企业会因自动扣费而遭受无谓资金损失。"
    recommendation: "建议修改为经双方书面同意后方可续约，或确保我方享有取消自动续约的权利。"
    risk_type: renewal_lock_in
    confidence_base: 0.9
    requires_llm: false
    escalation: true

  - rule_id: contract.missing_termination
    name: 缺少终止条款
    category: structure
    severity: critical
    type: missing
    trigger:
      required_any:
        - "解除本合同"
        - "合同终止"
        - "终止本协议"
        - "termination"
        - "终止权"
    description: "全篇未发现合同解除或终止相关的独立条款。"
    why_it_matters: "若遇合作僵局或对方违约，缺少退出机制可能导致持续成本消耗。"
    recommendation: "补充单方解除权、违约解除权，并建议争取提前通知的无因解除权。"
    risk_type: exit_gap
    confidence_base: 0.95
    requires_llm: false
    escalation: true

  - rule_id: contract.missing_data_deletion
    name: 缺少数据删除 / 返还条款
    category: structure
    severity: high
    type: missing
    trigger:
      required_any:
        - "数据删除"
        - "销毁数据"
        - "返还数据"
        - "data deletion"
        - "destroy data"
        - "return data"
    description: "未发现合同终止后关于业务或用户数据如何处理的明确约定。"
    why_it_matters: "未规定数据销毁义务极易引发商业机密泄露及数据合规风险。"
    recommendation: "补充合同终止后的数据返还、删除、销毁证明和保密延续条款。"
    risk_type: data_security_exposure
    confidence_base: 0.95
    requires_llm: false
    escalation: true

  - rule_id: contract.missing_governing_law
    name: 缺少适用法律 / 管辖条款
    category: structure
    severity: high
    type: missing
    trigger:
      required_any:
        - "管辖"
        - "适用法律"
        - "争议解决"
        - "governing law"
        - "jurisdiction"
        - "dispute resolution"
    description: "未发现明确的法律适用与争议解决机构约定。"
    why_it_matters: "发生纠纷时，缺少管辖约定可能带来异地诉讼成本和法律适用不确定性。"
    recommendation: "补充适用法律及管辖条款，建议约定由我方所在地法院管辖或选择明确仲裁机构。"
    risk_type: dispute_resolution_uncertainty
    confidence_base: 0.95
    requires_llm: false
    escalation: false

  - rule_id: contract.ip_ownership_anomaly
    name: 知识产权归属异常
    category: intellectual_property
    severity: high
    type: semantic
    trigger:
      any:
        - "知识产权"
        - "所有权"
        - "交付物归"
        - "intellectual property"
        - "IP rights"
        - "work product"
    description: "检测到知识产权相关条款，需判断其归属是否严重偏向 Vendor。"
    why_it_matters: "可能导致企业出钱开发却丧失核心业务资产所有权。"
    recommendation: "建议人工复核定制开发成果、背景知识产权和许可范围。"
    risk_type: ip_ownership_exposure
    confidence_base: 0.5
    requires_llm: true
    escalation: true

  - rule_id: contract.overbroad_audit_rights
    name: 审计权过宽
    category: compliance
    severity: medium
    type: semantic
    trigger:
      any:
        - "审计权"
        - "检查权"
        - "audit right"
        - "right to inspect"
    description: "检测到 Vendor 要求对客户进行审计的条款，需判断范围是否过宽。"
    why_it_matters: "过宽审计权可能干扰业务运营，甚至造成其他机密数据泄露。"
    recommendation: "限制审计频次、提前通知、审计范围、费用承担和保密义务。"
    risk_type: audit_overreach
    confidence_base: 0.5
    requires_llm: true
    escalation: false
