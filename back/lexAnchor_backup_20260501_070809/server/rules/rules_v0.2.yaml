version: "0.2"
extends: rules_v0.1
domain: contract
contract_scope: saas_vendor
rules:
  - rule_id: contract.ai_training_data_use
    name: AI训练数据使用风险
    category: data_governance
    severity: high
    type: semantic
    trigger:
      any:
        - "训练模型"
        - "模型训练"
        - "用于训练"
        - "train models"
        - "model training"
        - "improve services"
    description: "检测到对方可能将客户数据、业务数据或合同资料用于模型训练或服务改进。"
    why_it_matters: "未经明确限制的数据训练用途可能造成商业秘密、个人信息或客户数据外流。"
    recommendation: "要求明确禁止将客户数据用于模型训练，或限定为匿名化、聚合化且经书面授权的用途。"
    risk_type: data_governance_exposure
    confidence_base: 0.55
    requires_llm: true
    escalation: true

  - rule_id: contract.assignment_without_consent
    name: 未经同意转让合同风险
    category: governance
    severity: high
    type: semantic
    trigger:
      any:
        - "转让本协议"
        - "转让合同"
        - "无需同意"
        - "assign this agreement"
        - "without consent"
        - "without prior consent"
    description: "检测到一方可能无需对方同意即可转让合同、权利或义务。"
    why_it_matters: "未经同意的转让可能导致交易对象、履约能力、数据处理方或责任承担主体发生变化。"
    recommendation: "要求转让需经我方事先书面同意，集团内部重组例外也应保留通知和责任承继要求。"
    risk_type: counterparty_change_risk
    confidence_base: 0.55
    requires_llm: true
    escalation: true

  - rule_id: contract.customer_content_broad_license
    name: 客户内容许可过宽
    category: intellectual_property
    severity: high
    type: semantic
    trigger:
      any:
        - "客户内容"
        - "客户数据"
        - "customer content"
        - "customer data"
        - "perpetual license"
        - "irrevocable license"
        - "worldwide license"
    description: "检测到对客户内容、客户数据或交付资料授予过宽许可的表述。"
    why_it_matters: "过宽许可可能使供应商长期使用、再许可或商业化客户资产。"
    recommendation: "限制许可目的、期限、地域、可转授权范围，并排除模型训练和营销用途。"
    risk_type: ip_license_overreach
    confidence_base: 0.55
    requires_llm: true
    escalation: true

  - rule_id: contract.confidentiality_residual_knowledge
    name: 保密信息残留知识例外
    category: confidentiality
    severity: high
    type: semantic
    trigger:
      any:
        - "残留知识"
        - "记忆中保留"
        - "residual knowledge"
        - "retained in memory"
        - "unaided memory"
    description: "检测到接收方保留或使用所谓残留知识的例外。"
    why_it_matters: "残留知识例外可能削弱保密义务，尤其涉及源代码、商业计划、价格、客户名单和技术方案时风险较高。"
    recommendation: "删除残留知识例外，或至少排除商业秘密、个人信息、源代码、价格和客户资料。"
    risk_type: confidentiality_leakage
    confidence_base: 0.55
    requires_llm: true
    escalation: true

  - rule_id: contract.subprocessor_without_notice
    name: 分包商 / 子处理者无需通知
    category: data_governance
    severity: high
    type: semantic
    trigger:
      any:
        - "子处理者"
        - "分包商"
        - "subprocessor"
        - "subcontractor"
        - "without notice"
        - "无需通知"
    description: "检测到供应商可使用分包商或数据子处理者但无需通知或同意。"
    why_it_matters: "未经控制的分包或子处理可能改变数据流向、责任主体和合规边界。"
    recommendation: "要求披露分包商/子处理者名单、提前通知、反对权、等同义务传递和供应商连带责任。"
    risk_type: third_party_processing_risk
    confidence_base: 0.55
    requires_llm: true
    escalation: true

  - rule_id: contract.unilateral_suspension_without_cure
    name: 单方暂停服务且无补救期
    category: service_continuity
    severity: high
    type: semantic
    trigger:
      any:
        - "暂停服务"
        - "中止服务"
        - "suspend services"
        - "suspend access"
        - "without notice"
        - "without cure period"
        - "无补救期"
    description: "检测到供应商可单方暂停服务、访问或支持，且缺少通知或补救机制。"
    why_it_matters: "关键系统被突然暂停可能造成业务中断、违约连锁和数据不可用。"
    recommendation: "要求提前通知、合理补救期、紧急暂停限定、数据导出权和服务恢复义务。"
    risk_type: business_continuity_risk
    confidence_base: 0.55
    requires_llm: true
    escalation: true

  - rule_id: contract.unilateral_price_increase
    name: 单方涨价 / 费用调整
    category: commercial
    severity: medium
    type: semantic
    trigger:
      any:
        - "调整费用"
        - "提高价格"
        - "单方涨价"
        - "increase fees"
        - "change pricing"
        - "pricing may change"
    description: "检测到供应商可单方调整价格、费用或计费规则。"
    why_it_matters: "费用单方调整会破坏预算确定性，并可能绕开采购审批和续约谈判。"
    recommendation: "要求涨价上限、提前通知、续约期生效、无责终止权和不溯及既往。"
    risk_type: pricing_uncertainty
    confidence_base: 0.55
    requires_llm: true
    escalation: false

  - rule_id: contract.exclusive_remedy_limitation
    name: 唯一救济限制
    category: remedy
    severity: high
    type: semantic
    trigger:
      any:
        - "唯一救济"
        - "排他性救济"
        - "sole remedy"
        - "exclusive remedy"
        - "sole and exclusive remedy"
    description: "检测到合同将客户救济限制为唯一或排他性救济。"
    why_it_matters: "排他性救济可能排除损害赔偿、禁令救济、数据恢复或服务替代等关键权利。"
    recommendation: "保留法定救济、衡平救济、损害赔偿、数据恢复和安全事件相关救济。"
    risk_type: remedy_limitation
    confidence_base: 0.55
    requires_llm: true
    escalation: true

  - rule_id: contract.vendor_discretional_sla
    name: SLA由供应商单方决定
    category: service_level
    severity: medium
    type: semantic
    trigger:
      any:
        - "服务等级"
        - "服务可用性"
        - "service level"
        - "SLA"
        - "commercially reasonable efforts"
        - "sole discretion"
    description: "检测到服务等级、可用性或补偿安排由供应商单方决定或仅为商业合理努力。"
    why_it_matters: "缺少明确 SLA、服务信用和故障响应承诺会降低履约可衡量性。"
    recommendation: "补充可用性指标、响应时间、服务信用、故障报告、重复故障终止权和排除项边界。"
    risk_type: service_level_gap
    confidence_base: 0.55
    requires_llm: true
    escalation: false

  - rule_id: contract.export_compliance_shift
    name: 出口管制责任单方转嫁
    category: compliance
    severity: medium
    type: semantic
    trigger:
      any:
        - "出口管制"
        - "制裁合规"
        - "export control"
        - "sanctions compliance"
        - "solely responsible for compliance"
    description: "检测到出口管制、制裁或贸易合规责任被单方转嫁给客户。"
    why_it_matters: "合规责任应与各自行为和控制范围匹配，单方转嫁可能带来无法控制的合规风险。"
    recommendation: "明确双方各自负责自身出口、进口、制裁和贸易合规义务，并要求供应商就其技术和服务作出合规承诺。"
    risk_type: compliance_responsibility_shift
    confidence_base: 0.55
    requires_llm: true
    escalation: false
